<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard · Security Awareness</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b1219;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .module-container {
            max-width: 1440px;
            width: 100%;
            background: #0d161f;
            border-radius: 42px;
            padding: 30px 40px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #1c2a36;
            transition: all 0.2s;
        }

        /* --- GLOBAL DARK THEME --- */
        h1, h2, h3, p, span, div {
            color: #eef4fc;
        }
        .text-muted {
            color: #8a9bb0;
        }
        .badge-cyan {
            background: #0e2a36;
            color: #7be0ff;
            border: 1px solid #1f5f77;
        }
        .btn-cyan {
            background: #00b4d8;
            color: #0b1219;
            font-weight: 700;
            border: none;
            transition: 0.2s;
        }
        .btn-cyan:hover {
            background: #48cae4;
            transform: scale(1.02);
        }
        .btn-dark {
            background: #1e2c3a;
            color: #c8dae9;
            border: 1px solid #2d3f4f;
        }
        .btn-dark:hover {
            background: #2a3e50;
        }
        .cyber-glow {
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.08);
        }

        /* header nav */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a2835;
            flex-wrap: wrap;
            gap: 15px;
        }
        .brand {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d4eaff;
        }
        .brand i {
            color: #00b4d8;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 500;
            color: #9bb3cc;
        }
        .nav-links span {
            cursor: default;
            transition: 0.1s;
        }
        .nav-links span:hover {
            color: #d4eaff;
        }
        .nav-right .btn-cyan {
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 0.95rem;
        }

        /* slide panel */
        .slide-panel {
            background: transparent;
            border-radius: 32px;
            padding: 20px 0 10px;
            min-height: 440px;
        }

        /* --- HERO / LANDING --- */
        .hero-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 40px;
            align-items: center;
        }
        .hero-text h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        .hero-text .highlight {
            background: linear-gradient(135deg, #7be0ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-text p {
            font-size: 1.2rem;
            color: #b3c9df;
            margin: 20px 0 30px;
            max-width: 500px;
        }
        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .hero-buttons .btn-cyan {
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 1.1rem;
        }
        .hero-buttons .btn-dark {
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 1.1rem;
        }
        .hero-visual {
            background: #0f1c27;
            border-radius: 32px;
            padding: 25px;
            border: 1px solid #1e3443;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 260px;
            position: relative;
        }
        .hero-visual i {
            font-size: 8rem;
            color: #1f5f77;
            opacity: 0.7;
        }
        .hero-visual .neon-line {
            position: absolute;
            width: 70%;
            height: 4px;
            background: linear-gradient(90deg, #00b4d8, #7b61ff, transparent);
            top: 30%;
            left: 10%;
            filter: blur(6px);
        }

        /* --- EMAIL RED FLAGS (slide) --- */
        .email-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .email-mock {
            background: #0b1a24;
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid #203340;
        }
        .mock-header {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .mock-header .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .email-line {
            font-size: 0.95rem;
            margin: 6px 0;
            color: #b7cee4;
        }
        .email-line strong {
            color: #e4edf7;
        }
        .email-line .fake {
            color: #ff5f56;
        }
        .email-body {
            background: #0e1f2b;
            padding: 16px;
            border-radius: 16px;
            margin-top: 12px;
            border-left: 4px solid #ff5f56;
        }
        .email-body .link-fake {
            background: #16313f;
            color: #7be0ff;
            padding: 4px 14px;
            border-radius: 30px;
            display: inline-block;
            margin: 8px 0;
            border: 1px solid #1f5f77;
        }
        .flag-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .flag-item {
            background: #0f1c27;
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid #1e3241;
        }
        .flag-item i {
            color: #00b4d8;
            font-size: 1.8rem;
            margin-bottom: 6px;
        }
        .flag-item h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .flag-item p {
            color: #9bb3cc;
            font-size: 0.9rem;
        }

        /* --- FAKE SITES SLIDE --- */
        .url-examples {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .url-card {
            background: #0b1a24;
            border-radius: 20px;
            padding: 20px 24px;
            border: 1px solid #1e3241;
        }
        .url-card .url {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 8px 0;
        }
        .url-card .url .bad {
            color: #ff5f56;
        }
        .url-card .url .good {
            color: #5fe8a0;
        }
        .url-card .note {
            color: #8faec9;
            font-size: 0.95rem;
        }

        /* --- QUIZ --- */
        .quiz-container {
            background: #0e1a25;
            border-radius: 32px;
            padding: 30px 35px;
            border: 1px solid #213544;
            max-width: 780px;
            margin: 0 auto;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            color: #8a9bb0;
            margin-bottom: 10px;
        }
        .quiz-question {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 18px 0 24px;
        }
        .quiz-option {
            background: #0f1f2d;
            border: 2px solid #1c3142;
            border-radius: 60px;
            padding: 16px 24px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.15s;
            font-weight: 500;
            color: #d4eaff;
        }
        .quiz-option:hover {
            background: #1a2f40;
            border-color: #2d5670;
        }
        .quiz-option.selected-correct {
            background: #0f3a2a;
            border-color: #5fe8a0;
            box-shadow: 0 0 0 2px #5fe8a080;
        }
        .quiz-option.selected-wrong {
            background: #3a1a1a;
            border-color: #ff5f56;
            box-shadow: 0 0 0 2px #ff5f5680;
        }
        .quiz-feedback {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 40px;
            background: #142734;
            font-weight: 500;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav-btn {
            background: #1a2c3b;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid #2d4458;
            color: #d4eaff;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover:not(:disabled) {
            background: #253c50;
            border-color: #3d627d;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .primary-btn {
            background: #00b4d8;
            color: #0b1219;
            border: none;
        }
        .primary-btn:hover:not(:disabled) {
            background: #48cae4;
        }
        .dots {
            display: flex;
            gap: 10px;
        }
        .dot-nav {
            width: 12px;
            height: 12px;
            background: #1f384b;
            border-radius: 30px;
            transition: 0.2s;
        }
        .dot-nav.active {
            background: #00b4d8;
            width: 36px;
        }

        .footnote {
            text-align: center;
            margin-top: 30px;
            color: #5a748a;
            border-top: 1px solid #1a2a36;
            padding-top: 20px;
        }

        @media (max-width: 900px) {
            .hero-grid, .email-grid, .url-examples, .flag-cards {
                grid-template-columns: 1fr;
            }
            .module-container {
                padding: 20px;
            }
            .hero-text h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
<div class="module-container" id="app">

    <!-- Nav -->
    <div class="nav-bar">
        <div class="brand"><i class="fas fa-shield-halved"></i> PhishGuard</div>
        <div class="nav-links">
            <span>Emails</span>
            <span>Fake Sites</span>
            <span>Social Engineering</span>
            <span>Best Practices</span>
            <span>Examples</span>
            <span>Quiz</span>
        </div>
        <div class="nav-right">
            <button class="btn-cyan" onclick="document.getElementById('resetQuizBtn').click()">Take Quiz</button>
        </div>
    </div>

    <!-- Slide panel -->
    <div class="slide-panel" id="slidePanel">
        <!-- dynamic -->
    </div>

    <!-- navigation -->
    <div class="nav-controls">
        <div>
            <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
            <button class="nav-btn" id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="dots" id="dotsContainer"></div>
        <button class="nav-btn primary-btn" id="resetQuizBtn"><i class="fas fa-rotate-left"></i> Reset Quiz</button>
    </div>
    <div class="footnote">
        <i class="fas fa-shield"></i> Stay alert, verify before you trust.
    </div>
</div>

<script>
    (function() {
        const slides = [
            { id: 'hero', content: `
                <div class="hero-grid">
                    <div class="hero-text">
                        <div style="display:inline-block; background:#0e2a36; padding:8px 22px; border-radius:60px; border:1px solid #1f5f77; color:#7be0ff; font-weight:600; margin-bottom:16px;"><i class="fas fa-shield"></i> Security Awareness Module</div>
                        <h1>Don't Take the <span class="highlight">Bait</span></h1>
                        <p>Learn to recognize phishing emails and fake websites, understand the psychology behind social engineering, and build habits that keep you and your organization safe.</p>
                        <div class="hero-buttons">
                            <button class="btn-cyan" onclick="goToSlide(1)">Start Learning</button>
                            <button class="btn-dark" onclick="goToSlide(5)">Test Yourself</button>
                        </div>
                    </div>
                    <div class="hero-visual">
                        <div class="neon-line"></div>
                        <i class="fas fa-envelope-circle-check"></i>
                        <div style="position:absolute; bottom:20px; right:20px; background:#0e2a36; padding:6px 18px; border-radius:40px; border:1px solid #1f5f77; color:#7be0ff; font-size:0.9rem;"><i class="fas fa-bolt"></i> real-time detection</div>
                    </div>
                </div>
            ` },
            { id: 'email', content: `
                <h2 style="font-size:2.8rem; font-weight:700; margin-bottom:8px;">Recognizing phishing <span style="color:#7be0ff;">emails</span></h2>
                <p style="color:#b3c9df; font-size:1.2rem; margin-bottom:28px;">Most attacks start in your inbox. Train your eye to catch these six recurring warning signs before you click.</p>
                <div class="email-grid">
                    <div class="email-mock">
                        <div class="mock-header">
                            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                            <span style="margin-left:12px; color:#8a9bb0;">Inbox — Suspicious message</span>
                        </div>
                        <div class="email-line"><strong>From:</strong> PayPal Security <span class="fake">&lt;service@paypaI-alerts.com&gt;</span></div>
                        <div class="email-line"><strong>Subject:</strong> <span style="color:#ff5f56;">URGENT: Account suspended in 24h!!</span></div>
                        <div class="email-body">
                            <p style="color:#ff7a7a;">Dear Valued Customer,</p>
                            <p>We detect unusual activity on you're account. To avoid permanent suspension you must <span style="color:#ff5f56;">verify immediately</span> by clicking below.</p>
                            <div class="link-fake"><i class="fas fa-link"></i> http://paypal.secure-verify.ru/login</div>
                            <p style="color:#8a9bb0; margin-top:8px; font-size:0.9rem;">Failure to act will result in account closure.</p>
                        </div>
                    </div>
                    <div class="flag-cards">
                        <div class="flag-item"><i class="fas fa-at"></i><h4>Mismatched sender</h4><p>Display name says "PayPal" but address is @paypaI-alerts.com</p></div>
                        <div class="flag-item"><i class="fas fa-clock"></i><h4>Urgency & threats</h4><p>"Account suspended in 24h" – pressure to stop you from thinking.</p></div>
                        <div class="flag-item"><i class="fas fa-user"></i><h4>Generic greetings</h4><p>"Dear Customer" instead of your real name.</p></div>
                        <div class="flag-item"><i class="fas fa-link"></i><h4>Suspicious links</h4><p>Hover reveals a domain you don't recognize.</p></div>
                    </div>
                </div>
            ` },
            { id: 'fakesites', content: `
                <h2 style="font-size:2.8rem; font-weight:700; margin-bottom:8px;">Detecting fake <span style="color:#7be0ff;">websites</span></h2>
                <p style="color:#b3c9df; font-size:1.2rem; margin-bottom:28px;">Phishing links lead to convincing clones. Learn how to read a URL like a security pro.</p>
                <div class="url-examples">
                    <div class="url-card">
                        <div><i class="fas fa-lock" style="color:#5fe8a0;"></i> <span style="color:#8a9bb0;">https://www.</span><span class="good">yourbank.com</span><span style="color:#8a9bb0;">/login</span></div>
                        <div class="note" style="color:#5fe8a0;">Legitimate — the real domain is exactly "yourbank.com".</div>
                    </div>
                    <div class="url-card" style="border-color:#ff5f56;">
                        <div><i class="fas fa-lock" style="color:#ff5f56;"></i> <span style="color:#8a9bb0;">https://www.</span><span class="bad">yourbank</span><span style="color:#ff5f56;">.secure-login.ru</span><span style="color:#8a9bb0;">/login</span></div>
                        <div class="note" style="color:#ff5f56;">Fake — the true domain is "secure-login.ru". "yourbank" is just a subdomain.</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:25px;">
                    <div class="flag-item"><i class="fas fa-magnifying-glass"></i><h4>Read full domain</h4><p>Look-alikes swap letters: paypaI.com, g00gle.com. Read left of first slash.</p></div>
                    <div class="flag-item"><i class="fas fa-lock" style="color:#ff5f56;"></i><h4>HTTPS ≠ safe</h4><p>Attackers buy padlocks too. A certificate proves encryption, not honesty.</p></div>
                </div>
            ` },
            { id: 'social', content: `
                <h2 style="font-size:2.8rem; font-weight:700; margin-bottom:8px;">Social <span style="color:#7be0ff;">engineering</span> tactics</h2>
                <p style="color:#b3c9df; font-size:1.2rem; margin-bottom:28px;">Attackers manipulate emotions — fear, urgency, trust — to bypass your defenses.</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="flag-item"><i class="fas fa-bolt" style="color:#ff5f56;"></i><h4>Urgency & fear</h4><p>"Your account will be deleted in 30 minutes."</p></div>
                    <div class="flag-item"><i class="fas fa-user-tie"></i><h4>Authority impersonation</h4><p>Fake IT support, CEO, or IRS.</p></div>
                    <div class="flag-item"><i class="fas fa-gift" style="color:#fbbf24;"></i><h4>Too good to be true</h4><p>"You won a $1,000 gift card — click here."</p></div>
                    <div class="flag-item"><i class="fas fa-heart" style="color:#f472b6;"></i><h4>Sympathy / social pressure</h4><p>"Help a friend in need, urgent transfer."</p></div>
                </div>
                <p style="margin-top:20px; background:#0e2a36; padding:12px 24px; border-radius:60px; border:1px solid #1f5f77; color:#7be0ff;"><i class="fas fa-shield"></i> Always verify via a trusted channel (phone, known email).</p>
            ` },
            { id: 'bestpractices', content: `
                <h2 style="font-size:2.8rem; font-weight:700; margin-bottom:20px;">✅ Best <span style="color:#7be0ff;">practices</span></h2>
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div style="background:#0e1f2b; padding:14px 24px; border-radius:60px; border:1px solid #1e3443;"><i class="fas fa-check-circle" style="color:#5fe8a0;"></i> Enable 2FA everywhere</div>
                    <div style="background:#0e1f2b; padding:14px 24px; border-radius:60px; border:1px solid #1e3443;"><i class="fas fa-check-circle" style="color:#5fe8a0;"></i> Verify sender email & domain</div>
                    <div style="background:#0e1f2b; padding:14px 24px; border-radius:60px; border:1px solid #1e3443;"><i class="fas fa-check-circle" style="color:#5fe8a0;"></i> Don't click links — type known URL manually</div>
                    <div style="background:#0e1f2b; padding:14px 24px; border-radius:60px; border:1px solid #1e3443;"><i class="fas fa-check-circle" style="color:#5fe8a0;"></i> Report phishing (phishing@yourorg, FTC)</div>
                </div>
            ` },
            { id: 'quiz', content: `
                <h2 style="font-size:2.8rem; font-weight:700; margin-bottom:8px;">Interactive <span style="color:#7be0ff;">quiz</span></h2>
                <p style="color:#b3c9df; margin-bottom:25px;">Five quick scenarios. Choose the safest response and learn from instant feedback.</p>
                <div class="quiz-container">
                    <div class="quiz-header">
                        <span>Question <span id="qNum">1</span> of 5</span>
                        <span>Score: <span id="scoreDisplay">0</span></span>
                    </div>
                    <div id="quizQuestion" class="quiz-question">An email from "Amazon" asks you to confirm your password via a link because of "unusual activity." What's the safest move?</div>
                    <div id="quizOptions"></div>
                    <div id="quizFeedback" class="quiz-feedback" style="display:none;"></div>
                </div>
            ` }
        ];

        // QUIZ DATA (5 questions)
        const quizData = [
            { q: 'An email from "Amazon" asks you to confirm your password via a link because of "unusual activity." What\'s the safest move?', options: ['Click the link and log in quickly', 'Reply asking if it\'s legitimate', 'Go to amazon.com directly by typing the address yourself', 'Forward it to all your contacts'], correct: 2 },
            { q: 'You receive an email from "HR" with a link to "update your tax form." The sender address is hr@comp4ny-update.com. What should you do?', options: ['Click the link and fill out the form', 'Ignore and report to IT', 'Reply with your employee ID', 'Call the number in the email'], correct: 1 },
            { q: 'Which of these is a common social engineering tactic?', options: ['Creating urgency', 'Offering free coffee', 'Asking for your favorite color', 'Sending a calendar invite'], correct: 0 },
            { q: 'What does a green padlock in the address bar indicate?', options: ['The website is 100% legitimate', 'The connection is encrypted', 'The website is secure from phishing', 'You are safe to enter any data'], correct: 1 },
            { q: 'You see a URL: https://paypaI.com/reset — what is the best action?', options: ['Click it immediately', 'Ignore and type paypal.com', 'Enter your password there', 'Share it with friends'], correct: 1 }
        ];
        let quizIndex = 0;
        let score = 0;
        let quizAnswered = false;

        // ----- state -----
        let currentSlide = 0;
        const slidePanel = document.getElementById('slidePanel');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('dotsContainer');
        const resetQuizBtn = document.getElementById('resetQuizBtn');

        function renderSlide(index) {
            const slide = slides[index];
            slidePanel.innerHTML = slide.content;
            updateDots(index);
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === slides.length - 1);
            if (slide.id === 'quiz') {
                quizIndex = 0; score = 0; quizAnswered = false;
                renderQuizQuestion();
            }
        }

        function renderQuizQuestion() {
            if (quizIndex >= quizData.length) {
                document.getElementById('quizQuestion').innerText = '🎉 Quiz complete! You scored ' + score + '/' + quizData.length;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizFeedback').style.display = 'block';
                document.getElementById('quizFeedback').innerText = score === quizData.length ? 'Perfect! You\'re a phishing pro.' : 'Review the module and try again.';
                document.getElementById('qNum').innerText = quizData.length;
                return;
            }
            const data = quizData[quizIndex];
            document.getElementById('qNum').innerText = (quizIndex + 1);
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('quizQuestion').innerText = data.q;
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerText = opt;
                div.dataset.idx = idx;
                div.addEventListener('click', function(e) {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const correctIdx = data.correct;
                    const options = document.querySelectorAll('.quiz-option');
                    options.forEach(o => {
                        o.classList.remove('selected-correct', 'selected-wrong');
                    });
                    if (idx === correctIdx) {
                        this.classList.add('selected-correct');
                        score++;
                        document.getElementById('scoreDisplay').innerText = score;
                        document.getElementById('quizFeedback').style.display = 'block';
                        document.getElementById('quizFeedback').innerText = '✅ Correct!';
                    } else {
                        this.classList.add('selected-wrong');
                        options[correctIdx].classList.add('selected-correct');
                        document.getElementById('quizFeedback').style.display = 'block';
                        document.getElementById('quizFeedback').innerText = '❌ The correct answer was: "' + data.options[correctIdx] + '"';
                    }
                    // auto advance after 1.6s?
                    setTimeout(() => {
                        quizAnswered = false;
                        document.getElementById('quizFeedback').style.display = 'none';
                        quizIndex++;
                        if (quizIndex < quizData.length) {
                            renderQuizQuestion();
                        } else {
                            renderQuizQuestion(); // shows complete
                        }
                    }, 1800);
                });
                container.appendChild(div);
            });
        }

        function updateDots(activeIndex) {
            dotsContainer.innerHTML = '';
            for (let i = 0; i < slides.length; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot-nav' + (i === activeIndex ? ' active' : '');
                dotsContainer.appendChild(dot);
            }
        }

        window.goToSlide = function(idx) {
            if (idx >= 0 && idx < slides.length) {
                currentSlide = idx;
                renderSlide(currentSlide);
            }
        };

        function goToSlideInternal(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;
            renderSlide(currentSlide);
        }

        prevBtn.addEventListener('click', () => goToSlideInternal(currentSlide - 1));
        nextBtn.addEventListener('click', () => goToSlideInternal(currentSlide + 1));
        resetQuizBtn.addEventListener('click', () => {
            if (slides[currentSlide].id === 'quiz') {
                quizIndex = 0; score = 0; quizAnswered = false;
                renderQuizQuestion();
            } else {
                goToSlideInternal(5); // go to quiz
            }
        });

        renderSlide(0);
    })();
</script>
</body>
</html>
